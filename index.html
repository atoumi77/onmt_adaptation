<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ONMT — Demandes de production</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
/* ---------- BASE ---------- */
* { box-sizing:border-box; margin:0; padding:0 }
body {
  font-family: Arial, Helvetica, sans-serif;
  background:#f6f6f6;
  color:#111;
}
.hidden{display:none}

/* ---------- LOGOS ---------- */
header, footer {
  background:#fff;
  border-bottom:1px solid #ddd;
  padding:16px;
}
footer {
  border-top:1px solid #ddd;
  border-bottom:none;
  text-align:center;
}
img.logo {
  height:40px;
}

/* ---------- FORM ---------- */
.container {
  max-width:800px;
  margin:40px auto;
  padding:20px;
  background:#fff;
  border-radius:10px;
}
.field {
  margin-bottom:14px;
}
label {
  display:block;
  font-weight:600;
  margin-bottom:6px;
}
input, select, textarea, button {
  width:100%;
  padding:10px;
}
button {
  background:#111;
  color:#fff;
  border:none;
  cursor:pointer;
}

/* ---------- CONDITIONAL ---------- */
.extra-field,
.cond,
.cond-row2 {
  display:none;
}
.show {
  display:block;
}

/* ---------- SUCCESS ---------- */
.success {
  margin-top:20px;
  padding:14px;
  background:#e6f7ea;
  border:1px solid #b6e2c2;
}

/* ---------- DASH ---------- */
#dashboard {
  display:none;
}
table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}
th,td {
  padding:10px;
  border-bottom:1px solid #ddd;
  text-align:left;
}
</style>
</head>

<body>

<header>
  <img id="header-logo" class="logo">
</header>

<div class="container" id="page-form">

<h2>Soumettre une demande</h2>

<div class="field">
  <label>Nom *</label>
  <input id="f-nom">
</div>

<div class="field">
  <label>Email *</label>
  <input id="f-email" type="email">
</div>

<div class="field">
  <label>Sujet *</label>
  <input id="f-sujet">
</div>

<div class="field">
  <label>Type *</label>
  <select id="f-type" onchange="handleType(this.value)">
    <option value="">—</option>
    <option value="video">Vidéo</option>
    <option value="logo">Logo</option>
    <option value="photo">Photo</option>
    <option value="autre">Autre</option>
  </select>
</div>

<div class="extra-field" id="c-type-autre">
  <label>Préciser</label>
  <input id="f-type-autre">
</div>

<div class="cond" id="c-video">
  <label>Durée vidéo</label>
  <select id="f-duree" onchange="handleSelectAutre('f-duree','c-duree-autre')">
    <option value="">—</option>
    <option>15s</option>
    <option>30s</option>
    <option value="Autre">Autre</option>
  </select>
  <div class="extra-field" id="c-duree-autre">
    <input id="f-duree-autre" placeholder="Précisez">
  </div>
</div>

<div class="field">
  <label>Description *</label>
  <textarea id="f-desc"></textarea>
</div>

<button onclick="submitForm()">Envoyer</button>

<div class="success hidden" id="success-msg">
  ✅ Demande envoyée avec succès
</div>

</div>

<footer>
  <img id="footer-logo" class="logo">
</footer>

<script>
/* ================= CONFIG ================= */

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby30rWPEK3DzluNDKE3zxH-rwPgMEGuTOTr6mcYzs8mkqU0gc-y1d1j-bVJ7Emy7RGsYQ/exec";

const EMAILJS_PUBLIC_KEY = "ls3CYNJkamy7_vDKV";
const EMAILJS_SERVICE_ID = "service_gxfkhp6";
const EMAILJS_TEMPLATE_ID = "template_xb7ntmn";

/* LOGO BASE64 */
const LOGO_B64 = "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD…";

/* ================= INIT ================= */

emailjs.init(EMAILJS_PUBLIC_KEY);

document.getElementById("header-logo").src = LOGO_B64;
document.getElementById("footer-logo").src = LOGO_B64;

/* ================= HELPERS ================= */

function getVal(id){
  return document.getElementById(id)?.value.trim() || "";
}

function handleType(val){
  document.querySelectorAll(".cond").forEach(d=>d.classList.remove("show"));
  document.getElementById("c-type-autre").classList.remove("show");

  if(val==="video"){
    document.getElementById("c-video").classList.add("show");
  }
  if(val==="autre"){
    document.getElementById("c-type-autre").classList.add("show");
  }
}

function handleSelectAutre(selectId, boxId){
  const v = document.getElementById(selectId).value;
  document.getElementById(boxId).classList.toggle("show", v==="Autre");
}

/* ================= SUBMIT ================= */

function submitForm(){

  const data = {
    nom: getVal("f-nom"),
    email: getVal("f-email"),
    sujet: getVal("f-sujet"),
    type: getVal("f-type"),
    type_autre: getVal("f-type-autre"),
    duree: getVal("f-duree"),
    duree_autre: getVal("f-duree-autre"),
    description: getVal("f-desc"),
    date: new Date().toISOString(),
    status: "En attente"
  };

  if(!data.nom || !data.email || !data.sujet || !data.type || !data.description){
    alert("Merci de remplir tous les champs obligatoires");
    return;
  }

  /* Envoi Google Sheet */
  fetch(SCRIPT_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify(data)
  })
  .then(()=> {
    /* Email */
    return emailjs.send(
      EMAILJS_SERVICE_ID,
      EMAILJS_TEMPLATE_ID,
      data
    );
  })
  .then(()=>{
    document.getElementById("success-msg").classList.remove("hidden");
  })
  .catch(err=>{
    console.error(err);
    alert("Erreur lors de l’envoi");
  });
}
</script>

</body>
</html>
